        label {
            display: block;
            font-size: 0.14rem;
            font-weight: 300;
            color: #8e8e93;
        }

        #notip {
            display: none;
        }

        .checkbox {
            width: 0.16rem;
            height: 0.16rem;
            display: inline-block;
            background-color: #ffffff;
            border: solid 0.5px #c7c7cd;
            border-radius: 50%;
            vertical-align: middle;
        }

        #notip:checked~.checkbox {
            background-color: #fe5c3b;
        }

        a {
            display: inline-block;
            width: 10px;
            height: 5px;
            background: red;
            line-height: 0;
            font-size: 0;
            vertical-align: middle;
            -webkit-transform: rotate(45deg);
        }

        a:after {
            content: '/';
            display: block;
            width: 20px;
            height: 5px;
            background: red;
            -webkit-transform: rotate(-90deg) translateY(-50%) translateX(50%);
        }
    </style>
</head>
